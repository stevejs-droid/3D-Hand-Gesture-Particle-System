<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Band Particles Follow Point</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(circle at 50% 70%, #10162b 0%, #050913 45%, #000 100%);
    font-family: Arial, sans-serif;
  }

  canvas.webgl {
    display: block;
  }

  #video {
    position: fixed;
    right: 14px;
    bottom: 14px;
    width: 170px;
    border-radius: 14px;
    opacity: 0.78;
    transform: scaleX(-1);
    border: 1px solid rgba(255,255,255,0.12);
    background: #000;
    z-index: 5;
  }

  .hint {
    position: fixed;
    top: 14px;
    left: 14px;
    color: white;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    padding: 12px 15px;
    border-radius: 16px;
    z-index: 6;
    max-width: 360px;
    line-height: 1.45;
  }

  .hint b {
    display: block;
    font-size: 20px;
    margin-bottom: 4px;
  }

  .hint span {
    font-size: 13px;
    opacity: 0.88;
  }

  .status {
    color: #9effac;
    margin-top: 6px;
    font-size: 12px;
  }
</style>
</head>
<body>
  <div class="hint">
    <b>Band Particles Follow Point</b>
    <span>Particles stay in a long glowing band, but each particle individually leans and flows toward where you point.</span>
    <div id="status" class="status">Starting camera...</div>
  </div>
  <video id="video" autoplay playsinline muted></video>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    const statusEl = document.getElementById('status');
    const video = document.getElementById('video');

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x02040c, 35, 130);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 42);
    camera.lookAt(0, 5, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.domElement.className = 'webgl';
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.88));
    const dir = new THREE.DirectionalLight(0xffffff, 1.0);
    dir.position.set(10, 18, 10);
    scene.add(dir);

    const starGeo = new THREE.BufferGeometry();
    const starCount = 450;
    const starPos = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
      starPos[i * 3] = (Math.random() - 0.5) * 160;
      starPos[i * 3 + 1] = (Math.random() - 0.1) * 70;
      starPos[i * 3 + 2] = -Math.random() * 120;
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    const stars = new THREE.Points(
      starGeo,
      new THREE.PointsMaterial({ color: 0xc8d8ff, size: 0.16, transparent: true, opacity: 0.8 })
    );
    scene.add(stars);

    const particleCount = 3000;
    const positions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);
    const data = [];
    const geometry = new THREE.BufferGeometry();

    const c1 = new THREE.Color('#39ff8f');
    const c2 = new THREE.Color('#d7ff37');
    const c3 = new THREE.Color('#00f7ff');

    for (let i = 0; i < particleCount; i++) {
      const u = i / particleCount;
      const bandX = (u - 0.5) * 90 + (Math.random() - 0.5) * 2.5;
      const bandWidth = (Math.random() - 0.5) * 4.4;
      const bandDepth = (Math.random() - 0.5) * 3.5;
      const phase = Math.random() * Math.PI * 2;
      const lag = 0.03 + Math.random() * 0.04;

      positions[i * 3] = bandX;
      positions[i * 3 + 1] = 8 + bandWidth;
      positions[i * 3 + 2] = bandDepth;

      const blend = Math.sin(u * Math.PI);
      const col = c1.clone().lerp(c2, blend).lerp(c3, Math.random() * 0.18);
      colors[i * 3] = col.r;
      colors[i * 3 + 1] = col.g;
      colors[i * 3 + 2] = col.b;

      data.push({
        u,
        baseX: bandX,
        baseOffsetY: bandWidth,
        baseOffsetZ: bandDepth,
        phase,
        lag,
        spread: 0.6 + Math.random() * 1.2
      });
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
      size: 0.5,
      vertexColors: true,
      transparent: true,
      opacity: 0.95,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      sizeAttenuation: true
    });

    const points = new THREE.Points(geometry, material);
    scene.add(points);

    const band = {
      centerY: 8,
      slope: 0,
      curvature: 0
    };

    const hand = {
      seen: false,
      targetX: 0,
      targetY: 8,
      x: 0,
      y: 8,
      pinch: false
    };

    function updateHandFromLandmarks(landmarks) {
      const tip = landmarks[8];
      const thumb = landmarks[4];
      const pinchDist = Math.hypot(tip.x - thumb.x, tip.y - thumb.y, tip.z - thumb.z);

      hand.seen = true;
      hand.targetX = (0.5 - tip.x) * 38;
      hand.targetY = 3 + (0.5 - tip.y) * 15;
      hand.pinch = pinchDist < 0.06;

      statusEl.textContent = hand.pinch
        ? 'Hand detected. Pinch pulls particles tighter around your point.'
        : 'Hand detected. Point somewhere and nearby particles flow there.';
    }

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.6
    });

    hands.onResults((results) => {
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        updateHandFromLandmarks(results.multiHandLandmarks[0]);
      } else {
        hand.seen = false;
        statusEl.textContent = 'No hand detected. Show one hand clearly to the camera.';
      }
    });

    async function startCamera() {
      try {
        statusEl.textContent = 'Requesting camera access...';
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 640, height: 480, facingMode: 'user' },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        const mpCamera = new Camera(video, {
          onFrame: async () => {
            await hands.send({ image: video });
          },
          width: 640,
          height: 480
        });

        mpCamera.start();
        statusEl.textContent = 'Camera started. Point with your finger.';
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'Camera failed. Allow permission and run on GitHub Pages or localhost.';
      }
    }

    if (location.protocol === 'https:' || location.hostname === 'localhost') {
      startCamera();
    } else {
      statusEl.textContent = 'This needs HTTPS. GitHub Pages will work.';
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
      const pos = geometry.attributes.position.array;

      hand.x += ((hand.seen ? hand.targetX : 0) - hand.x) * 0.12;
      hand.y += ((hand.seen ? hand.targetY : 8) - hand.y) * 0.12;

      band.centerY += ((hand.seen ? 7.5 + (hand.y - 8) * 0.5 : 8) - band.centerY) * 0.08;
      band.slope += ((hand.seen ? hand.x * 0.015 : 0) - band.slope) * 0.08;
      band.curvature += ((hand.seen ? (hand.y - 8) * 0.08 : 0) - band.curvature) * 0.06;

      const pullRadius = hand.pinch ? 28 : 20;
      const pullStrength = hand.pinch ? 5.8 : 3.8;
      const tighten = hand.pinch ? 0.55 : 1.0;

      for (let i = 0; i < particleCount; i++) {
        const p = data[i];
        const nx = p.baseX / 45;
        const arc = -Math.pow(nx, 2) * 6.5 + 3.6;
        const waveY = Math.sin(t * 2.0 + p.phase + p.u * 10.0) * 0.28;
        const waveZ = Math.cos(t * 1.7 + p.phase + p.u * 7.0) * 0.55;

        const baseX = p.baseX;
        const baseY = band.centerY + arc + p.baseOffsetY * tighten + waveY + p.baseX * band.slope * 0.09;
        const baseZ = p.baseOffsetZ + waveZ + Math.abs(nx) * 1.8 + band.curvature * Math.abs(nx) * 2.0;

        let targetX = baseX;
        let targetY = baseY;
        let targetZ = baseZ;

        if (hand.seen) {
          const dx = hand.x - baseX;
          const dy = hand.y - baseY;
          const dist = Math.sqrt(dx * dx + dy * dy) + 0.0001;
          const influence = Math.max(0, 1 - dist / pullRadius);
          const eased = Math.pow(influence, 1.8);

          targetX += dx * eased * 0.72;
          targetY += dy * eased * 0.72;
          targetZ += eased * pullStrength * p.spread;
        }

        pos[i * 3] += (targetX - pos[i * 3]) * p.lag;
        pos[i * 3 + 1] += (targetY - pos[i * 3 + 1]) * p.lag;
        pos[i * 3 + 2] += (targetZ - pos[i * 3 + 2]) * p.lag;
      }

      geometry.attributes.position.needsUpdate = true;
      stars.rotation.y += 0.0005;
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
