<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glowing Particle Ribbon</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at center, #08111f 0%, #02050c 55%, #000 100%);
      font-family: Arial, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .hud {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 10;
      color: white;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 12px 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    .hud h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .hud p {
      margin: 6px 0 0;
      font-size: 12px;
      opacity: 0.8;
    }

    .controls {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 10px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 10px 14px;
      border-radius: 999px;
      color: white;
      align-items: center;
    }

    .controls button {
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.12);
      color: white;
      cursor: pointer;
      font-weight: 600;
    }

    .controls button:hover {
      background: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="hud">
      <h1>Glowing Particle Ribbon</h1>
      <p>Move mouse to bend the ribbon • Scroll to zoom</p>
    </div>
    <div class="controls">
      <button id="colorBtn">Change Colors</button>
      <button id="speedBtn">Boost Motion</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 1000);
    camera.position.set(0, 12, 48);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enablePan = false;
    controls.minDistance = 18;
    controls.maxDistance = 100;
    controls.maxPolarAngle = Math.PI * 0.48;

    scene.fog = new THREE.Fog(0x02050c, 45, 120);

    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);

    const dir = new THREE.DirectionalLight(0xffffff, 1.1);
    dir.position.set(8, 18, 10);
    scene.add(dir);

    const starGeo = new THREE.BufferGeometry();
    const starCount = 500;
    const starPositions = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
      starPositions[i * 3] = (Math.random() - 0.5) * 180;
      starPositions[i * 3 + 1] = (Math.random() - 0.5) * 90;
      starPositions[i * 3 + 2] = -Math.random() * 120;
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    const stars = new THREE.Points(
      starGeo,
      new THREE.PointsMaterial({ size: 0.18, transparent: true, opacity: 0.9, color: 0xdde9ff })
    );
    scene.add(stars);

    const particleCount = 2600;
    const positions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);
    const sizes = new Float32Array(particleCount);
    const bases = [];

    const palettes = [
      [new THREE.Color('#00ff99'), new THREE.Color('#d9ff00'), new THREE.Color('#66ffcc')],
      [new THREE.Color('#00e5ff'), new THREE.Color('#00ff88'), new THREE.Color('#b7ff00')],
      [new THREE.Color('#ff7b00'), new THREE.Color('#ffe600'), new THREE.Color('#00ffcc')]
    ];

    let paletteIndex = 0;
    let motionBoost = 1;

    function ribbonPoint(t, offset) {
      const x = (t - 0.5) * 80;
      const z = Math.sin(t * Math.PI * 1.1) * 10;
      const y = Math.sin(t * Math.PI * 2.4 + offset * 2.8) * 1.5 + Math.cos(t * Math.PI * 1.3) * 1.2;
      return { x, y, z };
    }

    const geometry = new THREE.BufferGeometry();
    const palette = () => palettes[paletteIndex];

    for (let i = 0; i < particleCount; i++) {
      const t = i / particleCount;
      const lane = (Math.random() - 0.5) * 6.2;
      const spread = (Math.random() - 0.5) * 1.6;
      const base = ribbonPoint(t, lane);
      const p = new THREE.Vector3(base.x, base.y + spread, base.z + lane);
      positions[i * 3] = p.x;
      positions[i * 3 + 1] = p.y;
      positions[i * 3 + 2] = p.z;

      const blend = (Math.sin(t * Math.PI * 3) + 1) / 2;
      const col = palette()[0].clone().lerp(palette()[1], blend * 0.7).lerp(palette()[2], Math.random() * 0.45);
      colors[i * 3] = col.r;
      colors[i * 3 + 1] = col.g;
      colors[i * 3 + 2] = col.b;
      sizes[i] = 2 + Math.random() * 4;

      bases.push({
        t,
        lane,
        spread,
        pulse: Math.random() * Math.PI * 2,
        speed: 0.4 + Math.random() * 1.1
      });
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
      size: 0.36,
      vertexColors: true,
      transparent: true,
      opacity: 0.95,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      sizeAttenuation: true
    });

    const points = new THREE.Points(geometry, material);
    scene.add(points);

    const glowPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(120, 60),
      new THREE.MeshBasicMaterial({ color: 0x06101f, transparent: true, opacity: 0.2 })
    );
    glowPlane.position.set(0, -10, -10);
    glowPlane.rotation.x = -Math.PI / 2.5;
    scene.add(glowPlane);

    const mouse = new THREE.Vector2(0, 0);
    window.addEventListener('pointermove', (e) => {
      mouse.x = (e.clientX / innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / innerHeight) * 2 + 1;
    });

    function recolor() {
      const cols = geometry.attributes.color.array;
      for (let i = 0; i < particleCount; i++) {
        const t = bases[i].t;
        const blend = (Math.sin(t * Math.PI * 3) + 1) / 2;
        const col = palette()[0].clone().lerp(palette()[1], blend * 0.7).lerp(palette()[2], Math.random() * 0.45);
        cols[i * 3] = col.r;
        cols[i * 3 + 1] = col.g;
        cols[i * 3 + 2] = col.b;
      }
      geometry.attributes.color.needsUpdate = true;
    }

    document.getElementById('colorBtn').onclick = () => {
      paletteIndex = (paletteIndex + 1) % palettes.length;
      recolor();
    };

    document.getElementById('speedBtn').onclick = () => {
      motionBoost = motionBoost === 1 ? 2.2 : 1;
    };

    document.getElementById('resetBtn').onclick = () => {
      motionBoost = 1;
      paletteIndex = 0;
      recolor();
      camera.position.set(0, 12, 48);
      controls.target.set(0, 0, 0);
    };

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const time = clock.getElapsedTime();
      const pos = geometry.attributes.position.array;

      for (let i = 0; i < particleCount; i++) {
        const b = bases[i];
        const base = ribbonPoint(b.t, b.lane + Math.sin(time * 0.25 + b.t * 5) * 0.5);
        const mouseInfluence = Math.exp(-Math.pow(b.t - ((mouse.x + 1) / 2), 2) * 30);
        const bendX = mouse.x * 7 * mouseInfluence;
        const liftY = mouse.y * 5 * mouseInfluence;
        const flutter = Math.sin(time * b.speed * motionBoost + b.pulse) * 0.8;
        const drift = Math.cos(time * (0.5 + b.speed) + b.pulse) * 0.35;

        pos[i * 3] = base.x + bendX;
        pos[i * 3 + 1] = base.y + b.spread + flutter + liftY;
        pos[i * 3 + 2] = base.z + b.lane + drift;
      }

      geometry.attributes.position.needsUpdate = true;
      points.rotation.y = Math.sin(time * 0.18) * 0.12;
      stars.rotation.y += 0.0006;
      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
