<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Magic Circle Follow Point</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(circle at 50% 70%, #10162b 0%, #050913 45%, #000 100%);
    font-family: Arial, sans-serif;
  }

  canvas.webgl {
    display: block;
  }

  #video {
    position: fixed;
    right: 14px;
    bottom: 14px;
    width: 170px;
    border-radius: 14px;
    opacity: 0.78;
    transform: scaleX(-1);
    border: 1px solid rgba(255,255,255,0.12);
    background: #000;
    z-index: 5;
  }

  .hint {
    position: fixed;
    top: 14px;
    left: 14px;
    color: white;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    padding: 12px 15px;
    border-radius: 16px;
    z-index: 6;
    max-width: 360px;
    line-height: 1.45;
  }

  .hint b {
    display: block;
    font-size: 20px;
    margin-bottom: 4px;
  }

  .hint span {
    font-size: 13px;
    opacity: 0.88;
  }

  .status {
    color: #9effac;
    margin-top: 6px;
    font-size: 12px;
  }
</style>
</head>
<body>
  <div class="hint">
    <b>Magic Circle Particles</b>
    <span>Particles form a glowing magic circle that orbits and follows where you point.</span>
    <div id="status" class="status">Starting camera...</div>
  </div>
  <video id="video" autoplay playsinline muted></video>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    const statusEl = document.getElementById('status');
    const video = document.getElementById('video');

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x02040c, 0.006);

    // Adjusted camera slightly higher to look down at the horizontal magic circle
    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 30, 50);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.domElement.className = 'webgl';
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.88));
    const dir = new THREE.DirectionalLight(0xffffff, 1.0);
    dir.position.set(10, 18, 10);
    scene.add(dir);

    const starGeo = new THREE.BufferGeometry();
    const starCount = 450;
    const starPos = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
      starPos[i * 3] = (Math.random() - 0.5) * 160;
      starPos[i * 3 + 1] = (Math.random() - 0.1) * 70;
      starPos[i * 3 + 2] = -Math.random() * 120;
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    const stars = new THREE.Points(
      starGeo,
      new THREE.PointsMaterial({ color: 0xc8d8ff, size: 0.16, transparent: true, opacity: 0.8 })
    );
    scene.add(stars);

    // -- MAGIC CIRCLE IMPLEMENTATION --
    const particleCount = 3000;
    const data = [];

    const c1 = new THREE.Color('#39ff8f'); // Neon green
    const c2 = new THREE.Color('#d7ff37'); // Yellow/green
    const c3 = new THREE.Color('#00f7ff');

    // Cylinder to look like a glowing streak
    const particleGeo = new THREE.CylinderGeometry(0.04, 0.04, 1.8, 5);
    particleGeo.rotateX(Math.PI / 2); // Align length with Z-axis so lookAt works properly

    const particleMat = new THREE.MeshBasicMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0.95,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    // Use InstancedMesh instead of Points to support rotation/leaning
    const instancedMesh = new THREE.InstancedMesh(particleGeo, particleMat, particleCount);
    scene.add(instancedMesh);

    const dummy = new THREE.Object3D();
    const currentPositions = new Float32Array(particleCount * 3);

    for (let i = 0; i < particleCount; i++) {
      // Create a flat ring/disc shape
      const radius = 8 + Math.pow(Math.random(), 1.5) * 20; 
      const angle = Math.random() * Math.PI * 2;
      const speed = (0.2 + Math.random() * 0.5) / radius; // Outer particles slower
      const yOffset = (Math.random() - 0.5) * 1.5;

      const blend = Math.random();
      const col = c1.clone().lerp(c2, blend).lerp(c3, Math.random() * 0.15);
      instancedMesh.setColorAt(i, col);

      data.push({
        radius,
        angle,
        speed,
        yOffset,
        lag: 0.05 + Math.random() * 0.05
      });
      
      currentPositions[i * 3] = Math.cos(angle) * radius;
      currentPositions[i * 3 + 1] = yOffset;
      currentPositions[i * 3 + 2] = Math.sin(angle) * radius;
    }
    instancedMesh.instanceColor.needsUpdate = true;

    const hand = {
      seen: false,
      targetX: 0,
      targetY: 5,
      targetZ: 0,
      x: 0,
      y: 5,
      z: 0,
      pinch: false
    };

    function updateHandFromLandmarks(landmarks) {
      const tip = landmarks[8];
      const thumb = landmarks[4];
      const pinchDist = Math.hypot(tip.x - thumb.x, tip.y - thumb.y, tip.z - thumb.z);

      hand.seen = true;
      hand.targetX = (0.5 - tip.x) * 60;
      hand.targetY = 5 + (0.5 - tip.y) * 30;
      hand.targetZ = tip.z * -50; 
      hand.pinch = pinchDist < 0.06;

      statusEl.textContent = hand.pinch
        ? 'Pinch detected. Magic circle tightens.'
        : 'Hand detected. Magic circle follows your finger.';
    }

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.6
    });

    hands.onResults((results) => {
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        updateHandFromLandmarks(results.multiHandLandmarks[0]);
      } else {
        hand.seen = false;
        statusEl.textContent = 'No hand detected. Show one hand clearly to the camera.';
      }
    });

    async function startCamera() {
      try {
        statusEl.textContent = 'Requesting camera access...';
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 640, height: 480, facingMode: 'user' },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        const mpCamera = new Camera(video, {
          onFrame: async () => {
            await hands.send({ image: video });
          },
          width: 640,
          height: 480
        });

        mpCamera.start();
        statusEl.textContent = 'Camera started. Point with your finger.';
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'Camera failed. Allow permission and run on GitHub Pages or localhost.';
      }
    }

    if (location.protocol === 'https:' || location.hostname === 'localhost') {
      startCamera();
    } else {
      statusEl.textContent = 'This needs HTTPS. GitHub Pages will work.';
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // Smoothly move the center of the magic circle to the hand
      hand.x += ((hand.seen ? hand.targetX : 0) - hand.x) * 0.08;
      hand.y += ((hand.seen ? hand.targetY : 5) - hand.y) * 0.08;
      hand.z += ((hand.seen ? hand.targetZ : 0) - hand.z) * 0.08;

      const tighten = hand.pinch ? 0.4 : 1.0;
      const speedUp = hand.pinch ? 2.5 : 1.0;

      for (let i = 0; i < particleCount; i++) {
        const p = data[i];
        
        // Advance orbit angle
        p.angle += p.speed * speedUp;

        // Calculate target orbit position around the hand
        const r = p.radius * tighten;
        const targetX = hand.x + Math.cos(p.angle) * r;
        const targetY = hand.y + p.yOffset + Math.sin(t * 2.0 + p.angle) * 0.5; // Slight wave
        const targetZ = hand.z + Math.sin(p.angle) * r;

        // Eased movement towards target
        currentPositions[i * 3] += (targetX - currentPositions[i * 3]) * p.lag;
        currentPositions[i * 3 + 1] += (targetY - currentPositions[i * 3 + 1]) * p.lag;
        currentPositions[i * 3 + 2] += (targetZ - currentPositions[i * 3 + 2]) * p.lag;

        const cx = currentPositions[i * 3];
        const cy = currentPositions[i * 3 + 1];
        const cz = currentPositions[i * 3 + 2];

        dummy.position.set(cx, cy, cz);

        // Make the streak lean towards its future position along the orbit (tangent)
        const tangentX = cx + Math.cos(p.angle + Math.PI / 2) * r;
        const tangentY = cy; // Keep horizontal lean
        const tangentZ = cz + Math.sin(p.angle + Math.PI / 2) * r;

        dummy.lookAt(tangentX, tangentY, tangentZ);
        dummy.updateMatrix();
        instancedMesh.setMatrixAt(i, dummy.matrix);
      }

      instancedMesh.instanceMatrix.needsUpdate = true;
      stars.rotation.y += 0.0005;
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
