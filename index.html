<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | Gesture & Audio Atom</title>
    <style>
        :root { --accent: #00f2ff; --bg: #020617; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; }
        canvas { display: block; }

        /* UI Panel */
        #ui {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px);
            padding: 24px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            width: 300px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        h1 { margin: 0 0 5px; font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }
        .subtitle { font-size: 0.8rem; color: var(--accent); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        
        .label { font-size: 0.7rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
        
        button {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 12px; border-radius: 10px; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); font-size: 0.85rem;
        }
        button:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }
        button.active { background: var(--accent); color: #020617; font-weight: 700; border-color: var(--accent); }

        .control-group { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        .row { display: flex; align-items: center; justify-content: space-between; }
        input[type="color"] { -webkit-appearance: none; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; background: none; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); }

        /* Media Container */
        #media-bridge {
            position: absolute; bottom: 20px; right: 20px; width: 200px; height: 150px;
            border-radius: 16px; overflow: hidden; border: 2px solid rgba(255,255,255,0.1);
            transform: scaleX(-1); background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Setup Overlay */
        #overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        #launch-btn {
            padding: 18px 45px; font-size: 1rem; background: var(--accent); color: #000;
            border: none; border-radius: 50px; cursor: pointer; font-weight: 800;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3); transition: transform 0.2s;
        }
        #launch-btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="font-size: 4rem; margin: 0;">AURA</h1>
    <p style="color: #94a3b8; max-width: 400px; margin-bottom: 40px; line-height: 1.6;">
        Revolutionary hand-tracked particle environment. Please allow <b>Camera</b> and <b>Microphone</b> access for full interaction.
    </p>
    <button id="launch-btn">ENTER EXPERIENCE</button>
</div>

<div id="ui">
    <h1>AURA</h1>
    <div class="subtitle">Neural Particle Lab</div>
    
    <span class="label">Evolution Template</span>
    <div class="grid">
        <button class="active" onclick="setTemplate(0, this)">Fireworks</button>
        <button onclick="setTemplate(1, this)">Heart</button>
        <button onclick="setTemplate(2, this)">Saturn</button>
        <button onclick="setTemplate(3, this)">Flower</button>
        <button onclick="setTemplate(4, this)">Buddha</button>
        <button onclick="setTemplate(5, this)">Atom Core</button>
    </div>

    <div class="control-group">
        <div class="row">
            <span class="label" style="margin: 0;">Neural Color</span>
            <input type="color" id="colorPicker" value="#00f2ff">
        </div>
    </div>

    <div style="font-size: 0.75rem; color: #64748b; line-height: 1.6; margin-top: 20px;">
        🖐 <b>Hand:</b> Pinch/Close to Scale & Expand<br>
        🔊 <b>Audio:</b> Particles pulsate to the beat
    </div>
</div>

<div id="media-bridge">
    <video id="input_video" playsinline></video>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script id="vertexShader" type="x-shader/x-vertex">
    uniform float uTime;
    uniform float uTargetShape;
    uniform float uScale;
    uniform float uAudio;
    uniform vec3 uColor;

    attribute vec3 aRandom;
    attribute float aSize;
    varying vec3 vColor;

    #define PI 3.14159265359

    vec3 getShape(float id) {
        float t = uTime * 0.5;
        vec3 p = vec3(0.0);
        
        if (id < 0.5) { // Fireworks
            float burst = mod(t * 3.0 + aRandom.x * 2.0, 4.0);
            p = normalize(aRandom) * burst * 15.0;
        } else if (id < 1.5) { // Heart
            float phi = aRandom.x * PI * 2.0;
            p.x = 16.0 * pow(sin(phi), 3.0);
            p.y = 13.0 * cos(phi) - 5.0 * cos(2.0*phi) - 2.0 * cos(3.0*phi) - cos(4.0*phi);
            p *= 0.6;
        } else if (id < 2.5) { // Saturn
            float angle = aRandom.x * PI * 2.0;
            float r = (aRandom.y > 0.0) ? (16.0 + aRandom.z * 4.0) : (aRandom.z * 8.0);
            p = vec3(cos(angle) * r, sin(angle) * r, aRandom.y * (aRandom.y > 0.0 ? 0.2 : 6.0));
        } else if (id < 3.5) { // Flower
            float u = aRandom.x * PI * 2.0;
            float v = aRandom.y * PI;
            float r = 10.0 + 4.0 * sin(8.0 * u) * sin(4.0 * v);
            p = vec3(r * sin(v) * cos(u), r * sin(v) * sin(u), r * cos(v));
        } else if (id < 4.5) { // Buddha (Parametric Symmetry)
            float u = aRandom.x * PI;
            float v = aRandom.y * PI * 2.0;
            float r = 7.0 + 2.5 * cos(3.0 * u);
            p.x = r * sin(u) * cos(v);
            p.y = 12.0 * cos(u) + sin(v) * 0.5;
            p.z = r * sin(u) * sin(v);
        } else { // Atom Core
            float angle = aRandom.x * PI * 2.0;
            p = vec3(cos(angle), sin(angle), aRandom.z) * (10.0 + aRandom.y * 5.0);
        }
        return p;
    }

    void main() {
        vec3 targetPos = getShape(uTargetShape);
        
        // Interaction Physics
        float audioPulsate = uAudio * 12.0 * aSize;
        vec3 finalPos = targetPos * uScale + (normalize(targetPos) * audioPulsate);
        
        vColor = uColor + (aRandom * 0.15);
        vec4 mvPosition = modelViewMatrix * vec4(finalPos, 1.0);
        
        gl_Position = projectionMatrix * mvPosition;
        gl_PointSize = (45.0 * aSize * uScale) * (1.0 / -mvPosition.z);
    }
</script>

<script id="fragmentShader" type="x-shader/x-fragment">
    varying vec3 vColor;
    void main() {
        float dist = length(gl_PointCoord - 0.5);
        if(dist > 0.5) discard;
        float alpha = smoothstep(0.5, 0.2, dist);
        gl_FragColor = vec4(vColor, alpha);
    }
</script>

<script>
    let scene, camera, renderer, material, analyser, dataArray;
    let currentTemplate = 0;

    const launchBtn = document.getElementById('launch-btn');
    const colorPicker = document.getElementById('colorPicker');

    launchBtn.onclick = async () => {
        document.getElementById('overlay').style.display = 'none';
        await initAudio();
        initThree();
        initHands();
    };

    function initThree() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.z = 45;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const count = 50000;
        const geo = new THREE.BufferGeometry();
        const rnd = new Float32Array(count * 3);
        const size = new Float32Array(count);

        for(let i=0; i<count; i++) {
            rnd[i*3] = (Math.random()-0.5)*2;
            rnd[i*3+1] = (Math.random()-0.5)*2;
            rnd[i*3+2] = (Math.random()-0.5)*2;
            size[i] = Math.random();
        }
        geo.setAttribute('aRandom', new THREE.BufferAttribute(rnd, 3));
        geo.setAttribute('aSize', new THREE.BufferAttribute(size, 1));

        material = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uTargetShape: { value: 0 },
                uScale: { value: 1.0 },
                uAudio: { value: 0 },
                uColor: { value: new THREE.Color(0x00f2ff) }
            },
            vertexShader: document.getElementById('vertexShader').textContent,
            fragmentShader: document.getElementById('fragmentShader').textContent,
            transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
        });

        const particles = new THREE.Points(geo, material);
        scene.add(particles);

        function render() {
            requestAnimationFrame(render);
            material.uniforms.uTime.value = performance.now() * 0.001;
            
            if (analyser) {
                analyser.getByteFrequencyData(dataArray);
                let volume = 0;
                for(let i=0; i<30; i++) volume += dataArray[i]; // Bass focus
                material.uniforms.uAudio.value = THREE.MathUtils.lerp(material.uniforms.uAudio.value, (volume/30)/255, 0.15);
            }
            
            material.uniforms.uColor.value.set(colorPicker.value);
            particles.rotation.y += 0.002;
            renderer.render(scene, camera);
        }
        render();
    }

    async function initAudio() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const source = ctx.createMediaStreamSource(stream);
            analyser = ctx.createAnalyser();
            analyser.fftSize = 256;
            source.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        } catch (e) { console.error("Audio failed", e); }
    }

    function initHands() {
        const videoElement = document.getElementById('input_video');
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        
        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const marks = results.multiHandLandmarks[0];
                // Pinch/Tension Detection
                const dist = Math.hypot(marks[4].x - marks[8].x, marks[4].y - marks[8].y);
                const targetScale = THREE.MathUtils.mapLinear(dist, 0.05, 0.35, 0.4, 3.5);
                material.uniforms.uScale.value = THREE.MathUtils.lerp(material.uniforms.uScale.value, targetScale, 0.1);
            }
        });

        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        cameraFeed.start();
    }

    function setTemplate(id, btn) {
        material.uniforms.uTargetShape.value = id;
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    window.onresize = () => {
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
