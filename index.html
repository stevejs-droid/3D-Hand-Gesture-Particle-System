<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura: Gesture & Audio Particles</title>
    <style>
        :root {
            --accent: #00f2ff;
            --bg: #05050b;
            --panel: rgba(10, 10, 20, 0.8);
        }

        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Inter', sans-serif; color: white; }
        canvas { display: block; }

        /* Modern UI Panel */
        #ui {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: var(--panel); backdrop-filter: blur(15px);
            padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);
            width: 280px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { margin: 0 0 15px; font-size: 1.2rem; letter-spacing: 1px; font-weight: 300; color: var(--accent); }
        
        .section-label { font-size: 0.7rem; text-transform: uppercase; color: #888; margin-bottom: 8px; display: block; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }

        button {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 10px; border-radius: 8px; cursor: pointer;
            transition: all 0.2s; font-size: 0.8rem;
        }

        button:hover { background: rgba(255,255,255,0.15); border-color: var(--accent); }
        button.active { background: var(--accent); color: #000; font-weight: 600; }

        .control-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        input[type="color"] { background: none; border: none; width: 40px; height: 40px; cursor: pointer; }

        #video-container {
            position: absolute; bottom: 20px; right: 20px; width: 160px; height: 120px;
            border-radius: 12px; overflow: hidden; border: 2px solid rgba(255,255,255,0.1);
            z-index: 5; transform: scaleX(-1); background: #000;
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        #overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #start-btn { padding: 15px 40px; font-size: 1.1rem; background: var(--accent); color: black; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="font-size: 3rem; margin-bottom: 10px;">AURA</h1>
    <p style="color: #666; margin-bottom: 30px;">Gesture & Sound Reactive 3D Experience</p>
    <button id="start-btn">Initialize Experience</button>
</div>

<div id="ui">
    <h1>AURA CONTROL</h1>
    
    <span class="section-label">Morph Template</span>
    <div class="grid">
        <button class="active" onclick="setTemplate(0, this)">Fireworks</button>
        <button onclick="setTemplate(1, this)">Heart</button>
        <button onclick="setTemplate(2, this)">Saturn</button>
        <button onclick="setTemplate(3, this)">Flower</button>
        <button onclick="setTemplate(4, this)">Statue</button>
        <button onclick="setTemplate(5, this)">Vortex</button>
    </div>

    <div class="control-row">
        <span class="section-label">Primary Color</span>
        <input type="color" id="colorPicker" value="#00f2ff">
    </div>

    <div style="font-size: 0.7rem; line-height: 1.5; color: #aaa; margin-top: 15px;">
        <div id="cam-status"><span class="status-dot" style="background: red;"></span> Camera: Offline</div>
        <div id="mic-status"><span class="status-dot" style="background: red;"></span> Audio: Offline</div>
        <p style="margin-top: 10px;">🖐 <b>Hand:</b> Pinch to expand / Move to tilt<br>
        🔊 <b>Audio:</b> Beat drives intensity</p>
    </div>
</div>

<div id="video-container">
    <video id="input_video" playsinline></video>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script id="vertexShader" type="x-shader/x-vertex">
    uniform float uTime;
    uniform float uMorph;
    uniform float uTargetShape;
    uniform float uScale;
    uniform float uAudio;
    uniform vec3 uColor;

    attribute vec3 aRandom;
    attribute float aSize;
    
    varying vec3 vColor;

    #define PI 3.14159265359

    vec3 getShape(float shapeId) {
        float t = uTime * 0.2;
        vec3 p = vec3(0.0);
        
        // 0. Fireworks
        if (shapeId < 0.5) {
            float burst = mod(t * 5.0 + aRandom.x * 2.0, 3.0);
            p = normalize(aRandom) * burst * 20.0;
        } 
        // 1. Heart
        else if (shapeId < 1.5) {
            float phi = aRandom.x * PI * 2.0;
            p.x = 16.0 * pow(sin(phi), 3.0);
            p.y = 13.0 * cos(phi) - 5.0 * cos(2.0*phi) - 2.0 * cos(3.0*phi) - cos(4.0*phi);
            p.z = aRandom.z * 2.0;
            p *= 0.6;
        }
        // 2. Saturn
        else if (shapeId < 2.5) {
            float angle = aRandom.x * PI * 2.0;
            float r = (aRandom.y > 0.0) ? (15.0 + aRandom.z * 3.0) : (aRandom.z * 7.0);
            p = vec3(cos(angle) * r, sin(angle) * r, aRandom.y * (aRandom.y > 0.0 ? 0.2 : 5.0));
        }
        // 3. Flower
        else if (shapeId < 3.5) {
            float u = aRandom.x * PI * 2.0;
            float v = aRandom.y * PI;
            float r = 10.0 + 4.0 * sin(6.0 * u) * sin(3.0 * v);
            p = vec3(r * sin(v) * cos(u), r * sin(v) * sin(u), r * cos(v));
        }
        // 4. Statue (Supershield/Abstract Figure)
        else if (shapeId < 4.5) {
            float u = aRandom.x * PI;
            float v = aRandom.y * PI * 2.0;
            float r = 8.0 + 2.0 * cos(3.0 * u);
            p.x = r * sin(u) * cos(v);
            p.y = 12.0 * cos(u) + sin(v) * 2.0;
            p.z = r * sin(u) * sin(v);
        }
        // 5. Vortex
        else {
            float angle = aRandom.x * PI * 10.0 + t;
            float r = aRandom.y * 20.0;
            p = vec3(cos(angle) * r, r * r * 0.05 - 10.0, sin(angle) * r);
        }
        return p;
    }

    void main() {
        // Morph logic: Smoothly interpolate between current state and target shape
        vec3 p1 = getShape(floor(uTargetShape));
        
        // Interaction
        float audioEffect = uAudio * 15.0 * aSize;
        vec3 finalPos = p1 * uScale + (normalize(p1) * audioEffect);
        
        vColor = uColor + (aRandom * 0.2);

        vec4 mvPosition = modelViewMatrix * vec4(finalPos, 1.0);
        gl_Position = projectionMatrix * mvPosition;
        gl_PointSize = (40.0 * aSize) * (1.0 / -mvPosition.z);
    }
</script>

<script id="fragmentShader" type="x-shader/x-fragment">
    varying vec3 vColor;
    void main() {
        if(length(gl_PointCoord - 0.5) > 0.5) discard;
        gl_FragColor = vec4(vColor, 1.0);
    }
</script>

<script>
    // --- Initial Config ---
    let scene, camera, renderer, particles, material;
    let audioContext, analyser, dataArray;
    let currentScale = 1.0;
    let targetTemplate = 0;

    const startBtn = document.getElementById('start-btn');
    const colorPicker = document.getElementById('colorPicker');

    startBtn.onclick = () => {
        document.getElementById('overlay').style.display = 'none';
        initAudio();
        initThree();
        initHands();
    };

    function initThree() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 40;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const count = 40000;
        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(count * 3);
        const rnd = new Float32Array(count * 3);
        const size = new Float32Array(count);

        for(let i=0; i<count; i++) {
            rnd[i*3] = (Math.random()-0.5)*2;
            rnd[i*3+1] = (Math.random()-0.5)*2;
            rnd[i*3+2] = (Math.random()-0.5)*2;
            size[i] = Math.random();
        }

        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geo.setAttribute('aRandom', new THREE.BufferAttribute(rnd, 3));
        geo.setAttribute('aSize', new THREE.BufferAttribute(size, 1));

        material = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uTargetShape: { value: 0 },
                uScale: { value: 1.0 },
                uAudio: { value: 0 },
                uColor: { value: new THREE.Color(0x00f2ff) }
            },
            vertexShader: document.getElementById('vertexShader').textContent,
            fragmentShader: document.getElementById('fragmentShader').textContent,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        particles = new THREE.Points(geo, material);
        scene.add(particles);

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        const time = performance.now() * 0.001;
        material.uniforms.uTime.value = time;

        // Audio Analysis
        if (analyser) {
            analyser.getByteFrequencyData(dataArray);
            let avg = 0;
            for(let i=0; i<10; i++) avg += dataArray[i]; // Focus on bass
            avg /= 10;
            material.uniforms.uAudio.value = THREE.MathUtils.lerp(material.uniforms.uAudio.value, avg / 255, 0.2);
        }

        // Color Update
        material.uniforms.uColor.value.set(colorPicker.value);

        renderer.render(scene, camera);
    }

    async function initAudio() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(stream);
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            source.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            document.getElementById('mic-status').innerHTML = '<span class="status-dot" style="background: #00ff00;"></span> Audio: Active';
        } catch (e) {
            alert("Microphone access denied. Audio reactivity disabled.");
        }
    }

    function initHands() {
        const videoElement = document.getElementById('input_video');
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});

        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        
        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // Pinch detection for Scaling (Thumb 4, Index 8)
                const d = Math.hypot(landmarks[4].x - landmarks[8].x, landmarks[4].y - landmarks[8].y);
                const targetScale = THREE.MathUtils.mapLinear(d, 0.05, 0.3, 0.5, 4.0);
                material.uniforms.uScale.value = THREE.MathUtils.lerp(material.uniforms.uScale.value, targetScale, 0.1);

                // Rotation based on hand position
                particles.rotation.y = (landmarks[0].x - 0.5) * 2;
                particles.rotation.x = (landmarks[0].y - 0.5) * 2;
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        camera.start().then(() => {
            document.getElementById('cam-status').innerHTML = '<span class="status-dot" style="background: #00ff00;"></span> Camera: Active';
        });
    }

    function setTemplate(idx, btn) {
        targetTemplate = idx;
        material.uniforms.uTargetShape.value = idx;
        document.querySelectorAll('.grid button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
