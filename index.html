<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gesture Particle Field</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: Arial, sans-serif;
  }

  canvas.webgl {
    display: block;
  }

  .panel {
    position: fixed;
    top: 24px;
    left: 24px;
    width: 340px;
    z-index: 20;
    color: white;
    padding: 22px;
    border-radius: 22px;
    background: linear-gradient(180deg, rgba(10,14,18,0.92), rgba(6,8,12,0.86));
    border: 1px solid rgba(255,255,255,0.16);
    box-shadow: 0 20px 60px rgba(0,0,0,0.45), inset 0 0 30px rgba(0,255,120,0.05);
    backdrop-filter: blur(10px);
  }

  .panel .small {
    color: #31d158;
    font-weight: 700;
    font-size: 18px;
    margin-bottom: 18px;
  }

  .panel h1 {
    margin: 0 0 18px;
    font-size: 30px;
    line-height: 1.1;
    color: #00ff84;
  }

  .gesture {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
    border-radius: 12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.04);
    font-size: 16px;
  }

  .statusBox {
    position: fixed;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 25;
    color: white;
    font-size: 26px;
    padding: 22px 28px;
    border-radius: 20px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    text-align: center;
    min-width: 420px;
  }

  .previewFrame {
    position: fixed;
    top: 24px;
    right: 24px;
    width: 275px;
    height: 200px;
    z-index: 21;
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,0.16);
    background: rgba(255,255,255,0.02);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    overflow: hidden;
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    opacity: 0.28;
    background: #000;
  }

  .previewOverlay {
    position: absolute;
    inset: 0;
    border-radius: 22px;
    box-shadow: inset 0 0 0 2px rgba(255,255,255,0.08);
    pointer-events: none;
  }

  .bottomHint {
    position: fixed;
    left: 24px;
    bottom: 18px;
    z-index: 20;
    color: rgba(255,255,255,0.68);
    font-size: 14px;
  }

  @media (max-width: 900px) {
    .panel {
      width: calc(100vw - 24px);
      left: 12px;
      top: 12px;
      padding: 16px;
    }

    .previewFrame {
      width: 160px;
      height: 120px;
      right: 12px;
      top: 12px;
    }

    .statusBox {
      min-width: unset;
      width: calc(100vw - 40px);
      font-size: 20px;
      padding: 18px 20px;
    }
  }
</style>
</head>
<body>
  <div class="panel">
    <div class="small">🎮 Gesture Controls</div>
    <h1 id="stateTitle">No Hand Detected</h1>
    <div class="gesture">🖐 Open Hand → Expand Field</div>
    <div class="gesture">☝ Pointing / ✊ Fist → Pull In</div>
    <div class="gesture">✌ Two Fingers → Rotate Drift</div>
    <div class="gesture">🤏 Pinch → Scale Up</div>
    <div class="gesture">👉 Move Hand → Pan View</div>
  </div>

  

  <div class="previewFrame">
    <video id="video" autoplay playsinline muted></video>
    <div class="previewOverlay"></div>
  </div>

  <div class="bottomHint">Allow camera • Run on HTTPS • Best with one clear hand</div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    const video = document.getElementById('video');
    const statusBox = document.getElementById('statusBox');
    const stateTitle = document.getElementById('stateTitle');

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x000000, 40, 110);

    const camera = new THREE.PerspectiveCamera(58, innerWidth / innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 42);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.domElement.className = 'webgl';
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.9));

    const particleCount = 7000;
    const positions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);
    const sizes = new Float32Array(particleCount);
    const particles = [];
    const geometry = new THREE.BufferGeometry();

    for (let i = 0; i < particleCount; i++) {
      const spread = 34 + Math.random() * 20;
      const x = (Math.random() - 0.5) * spread * 2.2;
      const y = (Math.random() - 0.5) * spread * 1.8;
      const z = (Math.random() - 0.5) * spread * 1.6;

      positions[i * 3] = x;
      positions[i * 3 + 1] = y;
      positions[i * 3 + 2] = z;

      const shade = 0.7 + Math.random() * 0.3;
      colors[i * 3] = shade;
      colors[i * 3 + 1] = shade;
      colors[i * 3 + 2] = shade;
      sizes[i] = Math.random() < 0.92 ? 1 : 2.5 + Math.random() * 3.5;

      particles.push({
        x, y, z,
        vx: 0, vy: 0, vz: 0,
        homeX: x, homeY: y, homeZ: z,
        noise: Math.random() * Math.PI * 2,
        drift: 0.002 + Math.random() * 0.004,
        drag: 0.91 + Math.random() * 0.03,
      });
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
      size: 0.28,
      vertexColors: true,
      transparent: true,
      opacity: 0.96,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      sizeAttenuation: true
    });

    const cloud = new THREE.Points(geometry, material);
    scene.add(cloud);

    const hand = {
      detected: false,
      x: 0, y: 0,
      targetX: 0, targetY: 0,
      openness: 0,
      pinch: false,
      rotateMode: false,
      pointing: false,
      strength: 0,
    };

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y, (a.z || 0) - (b.z || 0));
    }

    function classifyHand(landmarks) {
      const wrist = landmarks[0];
      const thumbTip = landmarks[4];
      const indexTip = landmarks[8];
      const middleTip = landmarks[12];
      const ringTip = landmarks[16];
      const pinkyTip = landmarks[20];

      const openness = (
        distance(indexTip, wrist) +
        distance(middleTip, wrist) +
        distance(ringTip, wrist) +
        distance(pinkyTip, wrist)
      ) / 4;

      const pinch = distance(thumbTip, indexTip) < 0.055;
      const indexOpen = distance(indexTip, wrist) > 0.22;
      const middleOpen = distance(middleTip, wrist) > 0.22;
      const ringOpen = distance(ringTip, wrist) > 0.20;
      const pinkyOpen = distance(pinkyTip, wrist) > 0.18;

      const pointing = indexOpen && !middleOpen && !ringOpen && !pinkyOpen;
      const rotateMode = indexOpen && middleOpen && !ringOpen;

      return {
        openness,
        pinch,
        pointing,
        rotateMode,
      };
    }

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.6
    });

    hands.onResults((results) => {
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const lm = results.multiHandLandmarks[0];
        const idx = lm[8];
        const gesture = classifyHand(lm);

        hand.detected = true;
        hand.targetX = (0.5 - idx.x) * 18;
        hand.targetY = (0.5 - idx.y) * 12;
        hand.openness = gesture.openness;
        hand.pinch = gesture.pinch;
        hand.rotateMode = gesture.rotateMode;
        hand.pointing = gesture.pointing;
        hand.strength = THREE.MathUtils.clamp((gesture.openness - 0.16) * 4, 0, 1);

        if (gesture.pinch) stateTitle.textContent = 'Pinch Detected';
        else if (gesture.rotateMode) stateTitle.textContent = 'Rotate Gesture';
        else if (gesture.pointing) stateTitle.textContent = 'Pointing Detected';
        else if (gesture.openness > 0.26) stateTitle.textContent = 'Open Hand Detected';
        else stateTitle.textContent = 'Fist / Pull Mode';

        statusBox.style.display = 'none';
      } else {
        hand.detected = false;
        stateTitle.textContent = 'No Hand Detected';
        
      }
    });

    async function startCamera() {
      try {
        
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 640, height: 480, facingMode: 'user' },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        const cam = new Camera(video, {
          onFrame: async () => {
            await hands.send({ image: video });
          },
          width: 640,
          height: 480
        });

        cam.start();
        
      } catch (err) {
        console.error(err);
        
      }
    }

    if (location.protocol === 'https:' || location.hostname === 'localhost') {
      startCamera();
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
      const pos = geometry.attributes.position.array;

      hand.x += ((hand.detected ? hand.targetX : 0) - hand.x) * 0.12;
      hand.y += ((hand.detected ? hand.targetY : 0) - hand.y) * 0.12;

      const expandStrength = hand.detected ? THREE.MathUtils.clamp((hand.openness - 0.2) * 3.2, 0, 1) : 0;
      const pullStrength = hand.detected ? (hand.pinch || hand.pointing ? 1 : 0.35) : 0;
      const rotateAmount = hand.rotateMode ? 0.012 : 0.002;

      cloud.rotation.y += rotateAmount;
      cloud.rotation.x = Math.sin(t * 0.3) * 0.08;

      for (let i = 0; i < particleCount; i++) {
        const p = particles[i];

        const breathe = 1 + expandStrength * 0.65;
        const homeX = p.homeX * breathe;
        const homeY = p.homeY * breathe;
        const homeZ = p.homeZ * breathe;

        const toHomeX = homeX - p.x;
        const toHomeY = homeY - p.y;
        const toHomeZ = homeZ - p.z;

        p.vx += toHomeX * 0.0028;
        p.vy += toHomeY * 0.0028;
        p.vz += toHomeZ * 0.0028;

        p.vx += Math.cos(t + p.noise) * p.drift * 0.4;
        p.vy += Math.sin(t * 1.1 + p.noise) * p.drift * 0.4;
        p.vz += Math.cos(t * 0.8 + p.noise) * p.drift * 0.4;

        if (hand.detected) {
          const dx = hand.x - p.x;
          const dy = hand.y - p.y;
          const dz = 0 - p.z;
          const dist = Math.sqrt(dx * dx + dy * dy + dz * dz) + 0.0001;
          const influence = Math.max(0, 1 - dist / 18);
          const pull = Math.pow(influence, 1.7) * (0.05 + pullStrength * 0.08);

          p.vx += (dx / dist) * pull;
          p.vy += (dy / dist) * pull;
          p.vz += (dz / dist) * pull * 0.8;
        }

        p.vx *= p.drag;
        p.vy *= p.drag;
        p.vz *= p.drag;

        p.x += p.vx;
        p.y += p.vy;
        p.z += p.vz;

        pos[i * 3] = p.x;
        pos[i * 3 + 1] = p.y;
        pos[i * 3 + 2] = p.z;
      }

      geometry.attributes.position.needsUpdate = true;
      renderer.render(scene, camera);
    }

    animate();

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    });
  </script>
</body>
</html>
