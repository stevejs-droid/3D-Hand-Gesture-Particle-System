<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Point Follow Particles</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(circle at 50% 70%, #10162b 0%, #050913 45%, #000 100%);
    font-family: Arial, sans-serif;
  }

  canvas.webgl {
    display: block;
  }

  #video {
    position: fixed;
    right: 14px;
    bottom: 14px;
    width: 170px;
    border-radius: 14px;
    opacity: 0.78;
    transform: scaleX(-1);
    border: 1px solid rgba(255,255,255,0.12);
    background: #000;
    z-index: 5;
  }

  .hint {
    position: fixed;
    top: 14px;
    left: 14px;
    color: white;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    padding: 12px 15px;
    border-radius: 16px;
    z-index: 6;
    max-width: 340px;
    line-height: 1.45;
  }

  .hint b {
    display: block;
    font-size: 20px;
    margin-bottom: 4px;
  }

  .hint span {
    font-size: 13px;
    opacity: 0.88;
  }

  .status {
    color: #9effac;
    margin-top: 6px;
    font-size: 12px;
  }
</style>
</head>
<body>
  <div class="hint">
    <b>Point Follow Particles</b>
    <span>Point with your index finger. The particles themselves will chase where you point.</span>
    <div id="status" class="status">Starting camera...</div>
  </div>
  <video id="video" autoplay playsinline muted></video>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    const statusEl = document.getElementById('status');
    const video = document.getElementById('video');

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x02040c, 25, 120);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 4, 34);
    camera.lookAt(0, 2, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.domElement.className = 'webgl';
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.9));
    const dir = new THREE.DirectionalLight(0xffffff, 1.0);
    dir.position.set(10, 12, 10);
    scene.add(dir);

    const starGeo = new THREE.BufferGeometry();
    const starCount = 300;
    const starPos = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
      starPos[i * 3] = (Math.random() - 0.5) * 140;
      starPos[i * 3 + 1] = (Math.random() - 0.2) * 60;
      starPos[i * 3 + 2] = -Math.random() * 90;
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    const stars = new THREE.Points(
      starGeo,
      new THREE.PointsMaterial({ color: 0xc8d8ff, size: 0.15, transparent: true, opacity: 0.7 })
    );
    scene.add(stars);

    const particleCount = 2600;
    const positions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);
    const particles = [];

    const geometry = new THREE.BufferGeometry();

    const c1 = new THREE.Color('#39ff8f');
    const c2 = new THREE.Color('#d7ff37');
    const c3 = new THREE.Color('#00f7ff');

    for (let i = 0; i < particleCount; i++) {
      const angle = Math.random() * Math.PI * 2;
      const radius = 6 + Math.random() * 24;
      const x = Math.cos(angle) * radius;
      const y = 7 + (Math.random() - 0.5) * 8;
      const z = (Math.random() - 0.5) * 8;

      positions[i * 3] = x;
      positions[i * 3 + 1] = y;
      positions[i * 3 + 2] = z;

      const blend = Math.random();
      const col = c1.clone().lerp(c2, blend).lerp(c3, Math.random() * 0.2);
      colors[i * 3] = col.r;
      colors[i * 3 + 1] = col.g;
      colors[i * 3 + 2] = col.b;

      particles.push({
        x,
        y,
        z,
        vx: 0,
        vy: 0,
        vz: 0,
        orbit: radius,
        angle: angle,
        lift: (Math.random() - 0.5) * 10,
        speed: 0.003 + Math.random() * 0.008,
        noise: Math.random() * Math.PI * 2,
        drag: 0.9 + Math.random() * 0.03
      });
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
      size: 0.5,
      vertexColors: true,
      transparent: true,
      opacity: 0.95,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      sizeAttenuation: true
    });

    const cloud = new THREE.Points(geometry, material);
    scene.add(cloud);

    const hand = {
      seen: false,
      targetX: 0,
      targetY: 7,
      x: 0,
      y: 7,
      pinch: false
    };

    function updateHandFromLandmarks(landmarks) {
      const tip = landmarks[8];
      const thumb = landmarks[4];
      const pinchDist = Math.hypot(tip.x - thumb.x, tip.y - thumb.y, tip.z - thumb.z);

      hand.seen = true;
      hand.targetX = (0.5 - tip.x) * 26;
      hand.targetY = 2 + (0.5 - tip.y) * 14;
      hand.pinch = pinchDist < 0.06;

      statusEl.textContent = hand.pinch
        ? 'Hand detected. Pinch makes the particles gather tighter.'
        : 'Hand detected. Point somewhere and the particles go there.';
    }

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.6
    });

    hands.onResults((results) => {
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        updateHandFromLandmarks(results.multiHandLandmarks[0]);
      } else {
        hand.seen = false;
        statusEl.textContent = 'No hand detected. Show one hand clearly to the camera.';
      }
    });

    async function startCamera() {
      try {
        statusEl.textContent = 'Requesting camera access...';
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 640, height: 480, facingMode: 'user' },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        const mpCamera = new Camera(video, {
          onFrame: async () => {
            await hands.send({ image: video });
          },
          width: 640,
          height: 480
        });

        mpCamera.start();
        statusEl.textContent = 'Camera started. Point with your finger.';
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'Camera failed. Allow permission and run on GitHub Pages or localhost.';
      }
    }

    if (location.protocol === 'https:' || location.hostname === 'localhost') {
      startCamera();
    } else {
      statusEl.textContent = 'This needs HTTPS. GitHub Pages will work.';
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
      const pos = geometry.attributes.position.array;

      hand.x += ((hand.seen ? hand.targetX : 0) - hand.x) * 0.12;
      hand.y += ((hand.seen ? hand.targetY : 7) - hand.y) * 0.12;

      const gather = hand.pinch ? 1.8 : 3.6;
      const pullStrength = hand.pinch ? 0.07 : 0.045;

      for (let i = 0; i < particleCount; i++) {
        const p = particles[i];

        p.angle += p.speed;
        const idleX = hand.seen ? hand.x + Math.cos(p.angle + t * 0.7 + p.noise) * p.orbit * 0.18 : Math.cos(p.angle) * p.orbit;
        const idleY = hand.seen ? hand.y + Math.sin(p.angle * 1.3 + t + p.noise) * gather + p.lift * 0.08 : 7 + p.lift * 0.2;
        const idleZ = Math.sin(p.angle + t * 1.2 + p.noise) * 3.5;

        const dx = hand.x - p.x;
        const dy = hand.y - p.y;
        const dist = Math.sqrt(dx * dx + dy * dy) + 0.001;
        const attract = hand.seen ? Math.max(0, 1 - dist / 18) * pullStrength : 0;

        p.vx += (idleX - p.x) * 0.012 + dx * attract;
        p.vy += (idleY - p.y) * 0.012 + dy * attract;
        p.vz += (idleZ - p.z) * 0.02;

        p.vx *= p.drag;
        p.vy *= p.drag;
        p.vz *= 0.92;

        p.x += p.vx;
        p.y += p.vy;
        p.z += p.vz;

        pos[i * 3] = p.x;
        pos[i * 3 + 1] = p.y;
        pos[i * 3 + 2] = p.z;
      }

      geometry.attributes.position.needsUpdate = true;
      stars.rotation.y += 0.0005;
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
