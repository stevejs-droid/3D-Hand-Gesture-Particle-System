<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hand Controlled Particle Ribbon</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at center, #08111f 0%, #02050c 55%, #000 100%);
      font-family: Arial, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .hud {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 20;
      color: white;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 12px 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      max-width: 340px;
    }

    .hud h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .hud p {
      margin: 6px 0 0;
      font-size: 12px;
      opacity: 0.85;
      line-height: 1.45;
    }

    .status {
      margin-top: 8px;
      font-size: 12px;
      color: #9dffb1;
    }

    .controls {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      gap: 10px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 10px 14px;
      border-radius: 999px;
      color: white;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .controls button {
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.12);
      color: white;
      cursor: pointer;
      font-weight: 600;
    }

    .controls button:hover {
      background: rgba(255,255,255,0.2);
    }

    #video {
      position: absolute;
      right: 18px;
      bottom: 100px;
      width: 220px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.15);
      opacity: 0.9;
      z-index: 15;
      background: #000;
      transform: scaleX(-1);
    }

    #guide {
      position: absolute;
      right: 18px;
      bottom: 100px;
      width: 220px;
      height: 165px;
      z-index: 16;
      pointer-events: none;
      transform: scaleX(-1);
      border-radius: 18px;
    }

    @media (max-width: 700px) {
      #video, #guide {
        width: 150px;
        height: 112px;
        bottom: 140px;
      }

      .hud {
        max-width: calc(100vw - 36px);
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="hud">
      <h1>Hand Controlled Particle Ribbon</h1>
      <p>Allow camera access. Move your hand to guide the glowing particles. Pinch thumb and index finger to boost the pull.</p>
      <div id="status" class="status">Starting camera...</div>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="guide"></canvas>

    <div class="controls">
      <button id="startBtn">Start Camera</button>
      <button id="colorBtn">Change Colors</button>
      <button id="modeBtn">Stronger Pull</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const video = document.getElementById('video');
    const guide = document.getElementById('guide');
    const gctx = guide.getContext('2d');
    const statusEl = document.getElementById('status');

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x02050c, 40, 120);

    const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 1000);
    camera.position.set(0, 12, 48);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enablePan = false;
    controls.enableRotate = false;
    controls.enableZoom = true;
    controls.minDistance = 16;
    controls.maxDistance = 90;

    const ambient = new THREE.AmbientLight(0xffffff, 0.75);
    scene.add(ambient);

    const dir = new THREE.DirectionalLight(0xffffff, 1.2);
    dir.position.set(8, 18, 10);
    scene.add(dir);

    const starGeo = new THREE.BufferGeometry();
    const starCount = 500;
    const starPositions = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
      starPositions[i * 3] = (Math.random() - 0.5) * 180;
      starPositions[i * 3 + 1] = (Math.random() - 0.5) * 90;
      starPositions[i * 3 + 2] = -Math.random() * 120;
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    const stars = new THREE.Points(
      starGeo,
      new THREE.PointsMaterial({ size: 0.18, transparent: true, opacity: 0.9, color: 0xdde9ff })
    );
    scene.add(stars);

    const particleCount = 3200;
    const positions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);
    const bases = [];

    const palettes = [
      [new THREE.Color('#00ff99'), new THREE.Color('#d9ff00'), new THREE.Color('#66ffcc')],
      [new THREE.Color('#00e5ff'), new THREE.Color('#00ff88'), new THREE.Color('#b7ff00')],
      [new THREE.Color('#ff7b00'), new THREE.Color('#ffe600'), new THREE.Color('#00ffcc')],
      [new THREE.Color('#ff3d81'), new THREE.Color('#ffdf40'), new THREE.Color('#7efff5')]
    ];

    let paletteIndex = 0;
    let pullBoost = 1;

    function ribbonPoint(t, offset) {
      const x = (t - 0.5) * 90;
      const z = Math.sin(t * Math.PI * 1.1) * 10;
      const y = Math.sin(t * Math.PI * 2.4 + offset * 2.8) * 1.5 + Math.cos(t * Math.PI * 1.3) * 1.2;
      return { x, y, z };
    }

    const geometry = new THREE.BufferGeometry();
    const palette = () => palettes[paletteIndex];

    for (let i = 0; i < particleCount; i++) {
      const t = i / particleCount;
      const lane = (Math.random() - 0.5) * 8.5;
      const spread = (Math.random() - 0.5) * 1.8;
      const base = ribbonPoint(t, lane);

      positions[i * 3] = base.x;
      positions[i * 3 + 1] = base.y + spread;
      positions[i * 3 + 2] = base.z + lane;

      const blend = (Math.sin(t * Math.PI * 3) + 1) / 2;
      const col = palette()[0].clone().lerp(palette()[1], blend * 0.7).lerp(palette()[2], Math.random() * 0.45);
      colors[i * 3] = col.r;
      colors[i * 3 + 1] = col.g;
      colors[i * 3 + 2] = col.b;

      bases.push({
        t,
        lane,
        spread,
        pulse: Math.random() * Math.PI * 2,
        speed: 0.5 + Math.random() * 1.3
      });
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
      size: 0.46,
      vertexColors: true,
      transparent: true,
      opacity: 0.95,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      sizeAttenuation: true
    });

    const points = new THREE.Points(geometry, material);
    scene.add(points);

    const glowPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(120, 60),
      new THREE.MeshBasicMaterial({ color: 0x06101f, transparent: true, opacity: 0.22 })
    );
    glowPlane.position.set(0, -10, -10);
    glowPlane.rotation.x = -Math.PI / 2.5;
    scene.add(glowPlane);

    const handState = {
      active: false,
      x: 0,
      y: 0,
      z: 0,
      pinch: false,
      pinchStrength: 0
    };

    function recolor() {
      const cols = geometry.attributes.color.array;
      for (let i = 0; i < particleCount; i++) {
        const t = bases[i].t;
        const blend = (Math.sin(t * Math.PI * 3) + 1) / 2;
        const col = palette()[0].clone().lerp(palette()[1], blend * 0.7).lerp(palette()[2], Math.random() * 0.45);
        cols[i * 3] = col.r;
        cols[i * 3 + 1] = col.g;
        cols[i * 3 + 2] = col.b;
      }
      geometry.attributes.color.needsUpdate = true;
    }

    document.getElementById('colorBtn').onclick = () => {
      paletteIndex = (paletteIndex + 1) % palettes.length;
      recolor();
    };

    document.getElementById('modeBtn').onclick = () => {
      pullBoost = pullBoost === 1 ? 1.8 : 1;
    };

    document.getElementById('resetBtn').onclick = () => {
      paletteIndex = 0;
      pullBoost = 1;
      recolor();
      camera.position.set(0, 12, 48);
      handState.active = false;
      statusEl.textContent = 'Reset done. Show your hand to the camera.';
    };

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.6
    });

    hands.onResults((results) => {
      guide.width = video.videoWidth || 220;
      guide.height = video.videoHeight || 165;
      gctx.clearRect(0, 0, guide.width, guide.height);

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        drawConnectors(gctx, landmarks, HAND_CONNECTIONS, { color: '#00ff99', lineWidth: 2 });
        drawLandmarks(gctx, landmarks, { color: '#d9ff00', lineWidth: 1, radius: 2.5 });

        const tip = landmarks[8];
        const thumb = landmarks[4];
        const pinchDistance = Math.hypot(tip.x - thumb.x, tip.y - thumb.y, tip.z - thumb.z);

        handState.active = true;
        handState.x = (0.5 - tip.x) * 70;
        handState.y = (0.5 - tip.y) * 28;
        handState.z = (0.5 - tip.x) * 10;
        handState.pinch = pinchDistance < 0.06;
        handState.pinchStrength = Math.max(0, Math.min(1, (0.08 - pinchDistance) / 0.05));

        statusEl.textContent = handState.pinch
          ? 'Hand detected • Pinch active • Strong attraction'
          : 'Hand detected • Move finger to guide particles';
      } else {
        handState.active = false;
        statusEl.textContent = 'No hand detected. Show your hand clearly to the camera.';
      }
    });

    let mpCamera = null;

    async function startCamera() {
      try {
        statusEl.textContent = 'Requesting camera access...';

        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 640, height: 480, facingMode: 'user' },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        if (mpCamera) {
          mpCamera.stop();
        }

        mpCamera = new Camera(video, {
          onFrame: async () => {
            await hands.send({ image: video });
          },
          width: 640,
          height: 480
        });

        mpCamera.start();
        statusEl.textContent = 'Camera started. Move your hand in front of the camera.';
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'Camera access failed. Run on HTTPS / GitHub Pages and allow camera permission.';
      }
    }

    document.getElementById('startBtn').onclick = startCamera;

    if (location.protocol === 'https:' || location.hostname === 'localhost') {
      startCamera();
    } else {
      statusEl.textContent = 'Camera needs HTTPS. GitHub Pages is fine after you push the file.';
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const time = clock.getElapsedTime();
      const pos = geometry.attributes.position.array;

      for (let i = 0; i < particleCount; i++) {
        const b = bases[i];
        const base = ribbonPoint(b.t, b.lane + Math.sin(time * 0.25 + b.t * 5) * 0.6);
        const flutter = Math.sin(time * b.speed + b.pulse) * 0.9;
        const drift = Math.cos(time * (0.5 + b.speed) + b.pulse) * 0.4;

        let targetX = base.x;
        let targetY = base.y + b.spread + flutter;
        let targetZ = base.z + b.lane + drift;

        if (handState.active) {
          const dx = handState.x - base.x;
          const dy = handState.y - (base.y + b.spread);
          const dz = handState.z - (base.z + b.lane);
          const dist = Math.sqrt(dx * dx + dy * dy + dz * dz) + 0.0001;
          const attractRadius = handState.pinch ? 42 : 28;
          const falloff = Math.max(0, 1 - dist / attractRadius);
          const power = Math.pow(falloff, 1.8) * (handState.pinch ? 18 : 10) * (1 + handState.pinchStrength) * pullBoost;

          targetX += (dx / dist) * power;
          targetY += (dy / dist) * power;
          targetZ += (dz / dist) * power * 0.6;
        }

        pos[i * 3] += (targetX - pos[i * 3]) * 0.08;
        pos[i * 3 + 1] += (targetY - pos[i * 3 + 1]) * 0.08;
        pos[i * 3 + 2] += (targetZ - pos[i * 3 + 2]) * 0.08;
      }

      geometry.attributes.position.needsUpdate = true;
      points.rotation.y = Math.sin(time * 0.15) * 0.08;
      stars.rotation.y += 0.0007;
      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
