<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Finger Controlled Particle Stream</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(circle at 50% 75%, #12192d 0%, #060914 45%, #000 100%);
    font-family: Arial, sans-serif;
  }
  canvas.webgl { display: block; }
  #video {
    position: fixed;
    right: 14px;
    bottom: 14px;
    width: 180px;
    border-radius: 14px;
    opacity: 0.78;
    transform: scaleX(-1);
    border: 1px solid rgba(255,255,255,0.12);
    background: #000;
    z-index: 5;
  }
  .hint {
    position: fixed;
    top: 14px;
    left: 14px;
    color: white;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    padding: 12px 15px;
    border-radius: 16px;
    z-index: 6;
    max-width: 360px;
    line-height: 1.45;
  }
  .hint b { display:block; font-size:20px; margin-bottom:4px; }
  .hint span { font-size: 13px; opacity: 0.88; }
  .status { color: #9effac; margin-top: 6px; font-size: 12px; }
</style>
</head>
<body>
  <div class="hint">
    <b>Finger Controlled Particle Stream</b>
    <span>Point with your index finger. The particles themselves stream toward your finger and leave a moving glowing path.</span>
    <div id="status" class="status">Starting camera...</div>
  </div>
  <video id="video" autoplay playsinline muted></video>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    const statusEl = document.getElementById('status');
    const video = document.getElementById('video');

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x02040c, 30, 120);

    const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 1000);
    camera.position.set(0, 4, 34);
    camera.lookAt(0, 2, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.domElement.className = 'webgl';
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.9));
    const dir = new THREE.DirectionalLight(0xffffff, 1.0);
    dir.position.set(10, 12, 10);
    scene.add(dir);

    const starGeo = new THREE.BufferGeometry();
    const starCount = 260;
    const starPos = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
      starPos[i * 3] = (Math.random() - 0.5) * 140;
      starPos[i * 3 + 1] = (Math.random() - 0.2) * 60;
      starPos[i * 3 + 2] = -Math.random() * 90;
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xc8d8ff, size: 0.15, transparent: true, opacity: 0.65 })));

    const particleCount = 3200;
    const positions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);
    const particles = [];
    const geometry = new THREE.BufferGeometry();

    const c1 = new THREE.Color('#48ff93');
    const c2 = new THREE.Color('#e8ff3a');
    const c3 = new THREE.Color('#14ffd9');

    for (let i = 0; i < particleCount; i++) {
      const a = Math.random() * Math.PI * 2;
      const r = 10 + Math.random() * 36;
      const x = Math.cos(a) * r;
      const y = 8 + (Math.random() - 0.5) * 7;
      const z = (Math.random() - 0.5) * 4;

      positions[i * 3] = x;
      positions[i * 3 + 1] = y;
      positions[i * 3 + 2] = z;

      const blend = Math.random();
      const col = c1.clone().lerp(c2, blend).lerp(c3, Math.random() * 0.25);
      colors[i * 3] = col.r;
      colors[i * 3 + 1] = col.g;
      colors[i * 3 + 2] = col.b;

      particles.push({
        x, y, z,
        vx: 0, vy: 0, vz: 0,
        homeAngle: a,
        homeRadius: r,
        homeLift: (Math.random() - 0.5) * 6,
        noise: Math.random() * Math.PI * 2,
        drag: 0.9 + Math.random() * 0.03,
        respawnBias: Math.random(),
      });
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
      size: 0.55,
      vertexColors: true,
      transparent: true,
      opacity: 0.96,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      sizeAttenuation: true
    });
    scene.add(new THREE.Points(geometry, material));

    const hand = {
      seen: false,
      targetX: 0,
      targetY: 8,
      x: 0,
      y: 8,
      vx: 0,
      vy: 0,
      pinch: false
    };

    const trail = [];
    const trailMax = 18;

    function addTrailPoint(x, y) {
      trail.unshift({ x, y });
      if (trail.length > trailMax) trail.pop();
    }

    function updateHandFromLandmarks(landmarks) {
      const tip = landmarks[8];
      const thumb = landmarks[4];
      const pinchDist = Math.hypot(tip.x - thumb.x, tip.y - thumb.y, tip.z - thumb.z);
      hand.seen = true;
      hand.targetX = (0.5 - tip.x) * 28;
      hand.targetY = 4 + (0.5 - tip.y) * 14;
      hand.pinch = pinchDist < 0.055;
      statusEl.textContent = hand.pinch
        ? 'Hand detected. Pinch makes the stream tighter.'
        : 'Hand detected. Point and move your finger.';
    }

    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
    hands.onResults((results) => {
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        updateHandFromLandmarks(results.multiHandLandmarks[0]);
      } else {
        hand.seen = false;
        statusEl.textContent = 'No hand detected. Show one hand clearly to the camera.';
      }
    });

    async function startCamera() {
      try {
        statusEl.textContent = 'Requesting camera access...';
        const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' }, audio: false });
        video.srcObject = stream;
        await video.play();
        const mpCamera = new Camera(video, {
          onFrame: async () => { await hands.send({ image: video }); },
          width: 640,
          height: 480
        });
        mpCamera.start();
        statusEl.textContent = 'Camera started. Point with your finger.';
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'Camera failed. Allow permission and run on GitHub Pages or localhost.';
      }
    }

    if (location.protocol === 'https:' || location.hostname === 'localhost') {
      startCamera();
    } else {
      statusEl.textContent = 'This needs HTTPS. GitHub Pages will work.';
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
      const pos = geometry.attributes.position.array;

      const targetRestX = hand.seen ? hand.targetX : 0;
      const targetRestY = hand.seen ? hand.targetY : 8;
      hand.x += (targetRestX - hand.x) * 0.18;
      hand.y += (targetRestY - hand.y) * 0.18;
      hand.vx = hand.vx * 0.78 + (hand.targetX - hand.x) * 0.08;
      hand.vy = hand.vy * 0.78 + (hand.targetY - hand.y) * 0.08;

      addTrailPoint(hand.x, hand.y);
      if (trail.length < trailMax) {
        while (trail.length < trailMax) trail.push({ x: hand.x, y: hand.y });
      }

      const streamTightness = hand.pinch ? 0.5 : 1.1;
      const suction = hand.pinch ? 0.13 : 0.085;
      const historyPull = hand.pinch ? 0.09 : 0.06;

      for (let i = 0; i < particleCount; i++) {
        const p = particles[i];
        const homeX = Math.cos(p.homeAngle + t * 0.12 + p.noise * 0.1) * p.homeRadius;
        const homeY = 8 + p.homeLift + Math.sin(t * 0.8 + p.noise) * 0.6;
        const homeZ = Math.cos(t * 1.5 + p.noise) * 0.8;

        const trailIndex = Math.min(trail.length - 1, Math.floor(p.respawnBias * (trail.length - 1)));
        const tp = trail[trailIndex] || { x: hand.x, y: hand.y };

        const dx = tp.x - p.x;
        const dy = tp.y - p.y;
        const dist = Math.sqrt(dx * dx + dy * dy) + 0.001;
        const attract = Math.max(0, 1 - dist / 22);

        const swirlX = Math.cos(t * 2.0 + p.noise) * streamTightness;
        const swirlY = Math.sin(t * 1.7 + p.noise) * streamTightness * 0.5;

        p.vx += (homeX - p.x) * 0.004 + dx * attract * historyPull + swirlX * attract * 0.01;
        p.vy += (homeY - p.y) * 0.005 + dy * attract * historyPull + swirlY * attract * 0.01;
        p.vz += (homeZ - p.z) * 0.02 + attract * suction * 0.9;

        const frontDx = hand.x - p.x;
        const frontDy = hand.y - p.y;
        const frontDist = Math.sqrt(frontDx * frontDx + frontDy * frontDy) + 0.001;
        const frontAttract = Math.max(0, 1 - frontDist / 12);
        p.vx += frontDx * frontAttract * suction;
        p.vy += frontDy * frontAttract * suction;

        p.vx *= p.drag;
        p.vy *= p.drag;
        p.vz *= 0.92;

        p.x += p.vx;
        p.y += p.vy;
        p.z += p.vz;

        pos[i * 3] = p.x;
        pos[i * 3 + 1] = p.y;
        pos[i * 3 + 2] = p.z;
      }

      geometry.attributes.position.needsUpdate = true;
      renderer.render(scene, camera);
    }

    animate();

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    });
  </script>
</body>
</html>
