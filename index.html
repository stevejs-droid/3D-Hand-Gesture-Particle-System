<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gesture Particle Space</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: Arial, sans-serif;
  }

  canvas.webgl {
    display: block;
  }

  .panel {
    position: fixed;
    top: 22px;
    left: 22px;
    width: 330px;
    z-index: 20;
    color: white;
    padding: 22px;
    border-radius: 24px;
    background: linear-gradient(180deg, rgba(8, 12, 16, 0.94), rgba(3, 5, 8, 0.88));
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 18px 60px rgba(0,0,0,0.5), inset 0 0 32px rgba(0,255,110,0.04);
    backdrop-filter: blur(10px);
  }

  .panel .label {
    color: #22c55e;
    font-weight: 700;
    font-size: 16px;
    margin-bottom: 18px;
  }

  .panel h1 {
    margin: 0 0 18px;
    font-size: 28px;
    line-height: 1.1;
    color: #00ff7a;
  }

  .gesture {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.04);
    font-size: 15px;
  }

  .preview {
    position: fixed;
    top: 22px;
    right: 22px;
    width: 270px;
    height: 195px;
    z-index: 20;
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,0.14);
    overflow: hidden;
    background: rgba(255,255,255,0.02);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    opacity: 0.3;
    background: #000;
  }

  .subtle {
    position: fixed;
    left: 24px;
    bottom: 18px;
    color: rgba(255,255,255,0.6);
    z-index: 20;
    font-size: 13px;
  }

  .mini {
    position: fixed;
    left: 50%;
    top: 26px;
    transform: translateX(-50%);
    z-index: 21;
    color: rgba(255,255,255,0.9);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 10px 14px;
    border-radius: 999px;
    backdrop-filter: blur(10px);
    font-size: 14px;
  }

  @media (max-width: 900px) {
    .panel {
      width: calc(100vw - 24px);
      left: 12px;
      top: 12px;
      padding: 16px;
    }

    .preview {
      width: 150px;
      height: 110px;
      top: 12px;
      right: 12px;
    }

    .mini {
      top: auto;
      bottom: 12px;
      font-size: 12px;
      max-width: calc(100vw - 24px);
      text-align: center;
    }
  }
</style>
</head>
<body>
  <div class="panel">
    <div class="label">🎮 Gesture Controls</div>
    <h1 id="stateTitle">No Hand Detected</h1>
    <div class="gesture">🖐 Open Hand → Zoom In</div>
    <div class="gesture">☝ Point / ✊ Fist → Zoom Out</div>
    <div class="gesture">✌ Two Fingers → Rotate</div>
    <div class="gesture">🤏 Pinch → Scale Up</div>
    <div class="gesture">👉 Move Hand → Pan View</div>
  </div>

  <div class="preview">
    <video id="video" autoplay playsinline muted></video>
  </div>

  <div class="mini" id="miniStatus">Allow camera to enable gesture control</div>
  <div class="subtle">Run on HTTPS • Best with one clear hand • White square particles</div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    const video = document.getElementById('video');
    const stateTitle = document.getElementById('stateTitle');
    const miniStatus = document.getElementById('miniStatus');

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x000000, 34, 120);

    const camera = new THREE.PerspectiveCamera(58, innerWidth / innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 44);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.domElement.className = 'webgl';
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1));

    const particleCount = 8500;
    const positions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);
    const particleData = [];
    const geometry = new THREE.BufferGeometry();

    for (let i = 0; i < particleCount; i++) {
      const spread = 26 + Math.random() * 22;
      const x = (Math.random() - 0.5) * spread * 2.2;
      const y = (Math.random() - 0.5) * spread * 1.9;
      const z = (Math.random() - 0.5) * spread * 1.7;

      positions[i * 3] = x;
      positions[i * 3 + 1] = y;
      positions[i * 3 + 2] = z;

      const shade = 0.72 + Math.random() * 0.28;
      colors[i * 3] = shade;
      colors[i * 3 + 1] = shade;
      colors[i * 3 + 2] = shade;

      particleData.push({
        x, y, z,
        vx: 0, vy: 0, vz: 0,
        homeX: x, homeY: y, homeZ: z,
        noise: Math.random() * Math.PI * 2,
        drift: 0.002 + Math.random() * 0.004,
        drag: 0.9 + Math.random() * 0.04,
        sizeBias: Math.random(),
      });
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
      size: 0.33,
      vertexColors: true,
      transparent: true,
      opacity: 0.98,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      sizeAttenuation: true,
    });

    const cloud = new THREE.Points(geometry, material);
    scene.add(cloud);

    const bigSquares = [];
    const squareGeo = new THREE.PlaneGeometry(1, 1);
    const squareMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.92, side: THREE.DoubleSide });

    for (let i = 0; i < 85; i++) {
      const m = new THREE.Mesh(squareGeo, squareMat.clone());
      const s = 0.18 + Math.random() * 1.8;
      m.scale.set(s, s, 1);
      m.position.set((Math.random() - 0.5) * 90, (Math.random() - 0.5) * 70, (Math.random() - 0.5) * 45);
      m.material.opacity = 0.38 + Math.random() * 0.55;
      scene.add(m);
      bigSquares.push({
        mesh: m,
        home: m.position.clone(),
        noise: Math.random() * Math.PI * 2,
        speed: 0.15 + Math.random() * 0.35,
      });
    }

    const hand = {
      detected: false,
      x: 0,
      y: 0,
      targetX: 0,
      targetY: 0,
      openness: 0,
      pinch: false,
      rotateMode: false,
      pointing: false,
      fistLike: false,
    };

    function dist(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y, (a.z || 0) - (b.z || 0));
    }

    function classify(landmarks) {
      const wrist = landmarks[0];
      const thumbTip = landmarks[4];
      const indexTip = landmarks[8];
      const middleTip = landmarks[12];
      const ringTip = landmarks[16];
      const pinkyTip = landmarks[20];

      const indexOpen = dist(indexTip, wrist) > 0.22;
      const middleOpen = dist(middleTip, wrist) > 0.22;
      const ringOpen = dist(ringTip, wrist) > 0.2;
      const pinkyOpen = dist(pinkyTip, wrist) > 0.18;

      const openness = (dist(indexTip, wrist) + dist(middleTip, wrist) + dist(ringTip, wrist) + dist(pinkyTip, wrist)) / 4;
      const pinch = dist(thumbTip, indexTip) < 0.055;
      const rotateMode = indexOpen && middleOpen && !ringOpen;
      const pointing = indexOpen && !middleOpen && !ringOpen && !pinkyOpen;
      const fistLike = !indexOpen && !middleOpen && !ringOpen && !pinkyOpen;

      return { openness, pinch, rotateMode, pointing, fistLike };
    }

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.6
    });

    hands.onResults((results) => {
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const lm = results.multiHandLandmarks[0];
        const idx = lm[8];
        const g = classify(lm);

        hand.detected = true;
        hand.targetX = (0.5 - idx.x) * 20;
        hand.targetY = (0.5 - idx.y) * 14;
        hand.openness = g.openness;
        hand.pinch = g.pinch;
        hand.rotateMode = g.rotateMode;
        hand.pointing = g.pointing;
        hand.fistLike = g.fistLike;

        if (g.pinch) stateTitle.textContent = 'Pinch Detected';
        else if (g.rotateMode) stateTitle.textContent = 'Rotate Gesture';
        else if (g.pointing) stateTitle.textContent = 'Pointing Detected';
        else if (g.openness > 0.26) stateTitle.textContent = 'Open Hand Detected';
        else if (g.fistLike) stateTitle.textContent = 'Fist Detected';
        else stateTitle.textContent = 'Hand Detected';

        miniStatus.textContent = 'Gesture control active';
      } else {
        hand.detected = false;
        stateTitle.textContent = 'No Hand Detected';
        miniStatus.textContent = 'Allow camera to enable gesture control';
      }
    });

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 640, height: 480, facingMode: 'user' },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        const cam = new Camera(video, {
          onFrame: async () => {
            await hands.send({ image: video });
          },
          width: 640,
          height: 480
        });

        cam.start();
        miniStatus.textContent = 'Show your hand to begin';
      } catch (err) {
        console.error(err);
        miniStatus.textContent = 'Camera not available';
      }
    }

    if (location.protocol === 'https:' || location.hostname === 'localhost') {
      startCamera();
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
      const pos = geometry.attributes.position.array;

      hand.x += ((hand.detected ? hand.targetX : 0) - hand.x) * 0.12;
      hand.y += ((hand.detected ? hand.targetY : 0) - hand.y) * 0.12;

      const isOpenHand = hand.detected && hand.openness > 0.26 && !hand.pinch && !hand.rotateMode && !hand.pointing && !hand.fistLike;
      const isZoomOut = hand.detected && (hand.pointing || hand.fistLike);
      const isRotate = hand.detected && hand.rotateMode;
      const isScaleUp = hand.detected && hand.pinch;

      const targetCameraZ = isOpenHand ? 30 : isZoomOut ? 56 : 44;
      camera.position.z += (targetCameraZ - camera.position.z) * 0.08;

      const targetScale = isScaleUp ? 1.55 : 1.0;
      cloud.scale.x += (targetScale - cloud.scale.x) * 0.08;
      cloud.scale.y += (targetScale - cloud.scale.y) * 0.08;
      cloud.scale.z += (targetScale - cloud.scale.z) * 0.08;

      const targetPanX = hand.detected ? hand.x * 0.45 : 0;
      const targetPanY = hand.detected ? hand.y * 0.28 : 0;
      camera.position.x += (targetPanX - camera.position.x) * 0.06;
      camera.position.y += (targetPanY - camera.position.y) * 0.06;
      camera.lookAt(0, 0, 0);

      const rotate = isRotate ? 0.02 : 0.003;
      const ambientPull = hand.detected ? (isScaleUp ? 1.15 : isZoomOut ? 0.35 : 0.18) : 0;

      cloud.rotation.y += rotate;
      cloud.rotation.x = Math.sin(t * 0.35) * 0.08;
      cloud.rotation.z = Math.cos(t * 0.18) * 0.04;

      for (let i = 0; i < particleCount; i++) {
        const p = particleData[i];
        const breathe = isOpenHand ? 1.22 : isZoomOut ? 0.9 : 1.0;
        const hx = p.homeX * breathe;
        const hy = p.homeY * breathe;
        const hz = p.homeZ * breathe;

        p.vx += (hx - p.x) * 0.0026;
        p.vy += (hy - p.y) * 0.0026;
        p.vz += (hz - p.z) * 0.0026;

        p.vx += Math.cos(t + p.noise) * p.drift * 0.45;
        p.vy += Math.sin(t * 1.1 + p.noise) * p.drift * 0.45;
        p.vz += Math.cos(t * 0.9 + p.noise) * p.drift * 0.45;

        if (hand.detected) {
          const dx = hand.x - p.x;
          const dy = hand.y - p.y;
          const dz = 0 - p.z;
          const d = Math.sqrt(dx * dx + dy * dy + dz * dz) + 0.0001;
          const influence = Math.max(0, 1 - d / 18);
          const strength = Math.pow(influence, 1.7) * (0.03 + ambientPull * 0.085);

          p.vx += (dx / d) * strength;
          p.vy += (dy / d) * strength;
          p.vz += (dz / d) * strength * 0.8;
        }

        p.vx *= p.drag;
        p.vy *= p.drag;
        p.vz *= p.drag;

        p.x += p.vx;
        p.y += p.vy;
        p.z += p.vz;

        pos[i * 3] = p.x;
        pos[i * 3 + 1] = p.y;
        pos[i * 3 + 2] = p.z;
      }

      for (const sq of bigSquares) {
        const m = sq.mesh;
        const sway = Math.sin(t * sq.speed + sq.noise);
        m.position.x += ((sq.home.x + hand.x * 0.6 + sway * 1.8) - m.position.x) * 0.03;
        m.position.y += ((sq.home.y + hand.y * 0.45 + Math.cos(t * sq.speed + sq.noise) * 1.2) - m.position.y) * 0.03;
        m.position.z += ((sq.home.z + (isScaleUp ? 6 : 0)) - m.position.z) * 0.025;
        m.rotation.z += 0.002 + sq.speed * 0.002;
      }

      geometry.attributes.position.needsUpdate = true;
      renderer.render(scene, camera);
    }

    animate();

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    });
  </script>
</body>
</html>
