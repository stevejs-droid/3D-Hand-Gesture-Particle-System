<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad Style Hand Ribbon</title>
<style>
body {margin:0; overflow:hidden; background:black;}
video {position:fixed; bottom:10px; right:10px; width:140px; border-radius:10px; opacity:0.8; transform:scaleX(-1);} 
</style>
</head>
<body>
<video id="video" autoplay playsinline muted></video>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script type="importmap">
{
 "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
 }
}
</script>

<script type="module">
import * as THREE from 'three';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight,0.1,1000);
camera.position.z = 40;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// PARTICLES (RIBBON)
const count = 2000;
const pos = new Float32Array(count*3);

for(let i=0;i<count;i++){
  let t = i/count;
  pos[i*3] = (t-0.5)*80;
  pos[i*3+1] = Math.sin(t*Math.PI)*5;
  pos[i*3+2] = 0;
}

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(pos,3));

const mat = new THREE.PointsMaterial({
 size:0.5,
 color:0x00ff99,
 transparent:true,
 opacity:0.9
});

const points = new THREE.Points(geo,mat);
scene.add(points);

// HAND CONTROL
const video = document.getElementById('video');
let handX = 0;
let handY = 0;

const hands = new Hands({locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});

hands.setOptions({maxNumHands:1});

hands.onResults((res)=>{
 if(res.multiHandLandmarks.length>0){
  let tip = res.multiHandLandmarks[0][8];
  handX = (0.5 - tip.x)*50;
  handY = (0.5 - tip.y)*20;
 }
});

const cam = new Camera(video,{
 onFrame: async ()=> await hands.send({image:video}),
 width:640,height:480
});

navigator.mediaDevices.getUserMedia({video:true}).then(stream=>{
 video.srcObject = stream;
 cam.start();
});

// ANIMATION (KEY CHANGE)
function animate(){
 requestAnimationFrame(animate);
 let p = geo.attributes.position.array;

 for(let i=0;i<count;i++){
  let baseX = (i/count-0.5)*80;

  // smooth ribbon follow
  p[i*3] += ((baseX + handX) - p[i*3]) * 0.05;
  p[i*3+1] += ((Math.sin(i*0.02)*5 + handY) - p[i*3+1]) * 0.05;
 }

 geo.attributes.position.needsUpdate = true;
 renderer.render(scene,camera);
}

animate();

addEventListener('resize',()=>{
 camera.aspect = innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
